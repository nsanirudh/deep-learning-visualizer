<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0c0e16"/>

  <!-- Edges: input → hidden -->
  <line x1="7" y1="10" x2="16" y2="7"  stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="7" y1="10" x2="16" y2="16" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="7" y1="10" x2="16" y2="25" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="7" y1="22" x2="16" y2="7"  stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="7" y1="22" x2="16" y2="16" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="7" y1="22" x2="16" y2="25" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.55"/>

  <!-- Edges: hidden → output -->
  <line x1="16" y1="7"  x2="25" y2="16" stroke="#a5b4fc" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="16" y1="16" x2="25" y2="16" stroke="#a5b4fc" stroke-width="1.1" stroke-opacity="0.55"/>
  <line x1="16" y1="25" x2="25" y2="16" stroke="#a5b4fc" stroke-width="1.1" stroke-opacity="0.55"/>

  <!-- Input nodes -->
  <circle cx="7" cy="10" r="3"   fill="#6366f1"/>
  <circle cx="7" cy="22" r="3"   fill="#6366f1"/>

  <!-- Hidden nodes -->
  <circle cx="16" cy="7"  r="2.4" fill="#818cf8"/>
  <circle cx="16" cy="16" r="2.4" fill="#818cf8"/>
  <circle cx="16" cy="25" r="2.4" fill="#818cf8"/>

  <!-- Output node -->
  <circle cx="25" cy="16" r="3"   fill="#a5b4fc"/>
</svg>
